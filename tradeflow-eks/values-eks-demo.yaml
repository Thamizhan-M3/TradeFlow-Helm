mongodb:
  enabled: true
  architecture: standalone
  replicaCount: 1
  replicaSetName: ""
  auth:
    enabled: false
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: "latest"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: "gp3"
    size: 2Gi
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  arbiter:
    enabled: false
  gateway:
    enabled: false
  pdb:
    enabled: false
    minAvailable: 1

networkPolicy:
  enabled: true
  dns:
    namespaceSelector: {}
    podSelector:
      matchLabels:
        k8s-app: kube-dns
    port: 53
  mongodb:
    port: 27017
