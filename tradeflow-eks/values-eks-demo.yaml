global:
  environment: eks-demo
  ingress:
    enabled: false
    domain: tradeflow.local
  gateway:
    enabled: false
    className: ""
    name: ""
  service:
    type: ClusterIP

gateway:
  enabled: false

common:
  gateway:
    enabled: false
    className: ""

haproxy:
  enabled: false

nginxGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: nginx
    tag: stable-alpine
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
  pdb:
    enabled: false
    minAvailable: 1

frontend:
  enabled: true
  replicaCount: 1
  rollout:
    enabled: false
  routing:
    enabled: false
  image:
    repository: thamizhanm3/tradeflow-frontend
    tag: "v0.0.3"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  routePath: /
  env:
    PORT: "80"
    VITE_USERS_API: "/api/users"
    VITE_STOCKS_API: "/api/stocks"
    VITE_TRADES_API: "/api/trades"
    VITE_PORTFOLIO_API: "/api/portfolio"
  probes:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  autoscaling:
    enabled: false
  pdb:
    enabled: false
    minAvailable: 1

user:
  enabled: true
  replicaCount: 1
  rollout:
    enabled: false
  routing:
    enabled: false
  image:
    repository: thamizhanm3/tradeflow-user
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4001
  routePath: "/api/users"
  env:
    PORT: "4001"
    MONGODB_URI: "mongodb://tradeflow-eks-mongodb:27017/user_db_demo"
  probes:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  autoscaling:
    enabled: false
  pdb:
    enabled: false
    minAvailable: 1

