{{- if .Values.nginxGateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-gateway-nginx-config
  labels:
    app.kubernetes.io/name: nginx-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      location = /api/users {
        proxy_pass http://{{ .Release.Name }}-user:{{ .Values.user.service.port }}/api;
      }

      location /api/users/ {
        proxy_pass http://{{ .Release.Name }}-user:{{ .Values.user.service.port }}/api/;
      }

      location = /api/stocks {
        proxy_pass http://{{ .Release.Name }}-stock:{{ .Values.stock.service.port }}/api;
      }

      location /api/stocks/ {
        proxy_pass http://{{ .Release.Name }}-stock:{{ .Values.stock.service.port }}/api/;
      }

      location = /api/trades {
        proxy_pass http://{{ .Release.Name }}-trading:{{ .Values.trading.service.port }}/api;
      }

      location /api/trades/ {
        proxy_pass http://{{ .Release.Name }}-trading:{{ .Values.trading.service.port }}/api/;
      }

      location = /api/portfolio {
        proxy_pass http://{{ .Release.Name }}-portfolio:{{ .Values.portfolio.service.port }}/api;
      }

      location /api/portfolio/ {
        proxy_pass http://{{ .Release.Name }}-portfolio:{{ .Values.portfolio.service.port }}/api/;
      }

      location / {
        proxy_pass http://{{ .Release.Name }}-frontend:{{ .Values.frontend.service.port }};
      }
    }
{{- end }}
